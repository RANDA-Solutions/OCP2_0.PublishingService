# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

pool: LinuxAgents

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: '5cc63894-80c7-458f-b948-5de6378f9d7e'
  imageRepository: 'opencredentialpublisherpublishingserviceapi'
  containerRegistry: 'randaocpregistry.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/OpenCredentialPublisher.PublishingService.Api/Dockerfile'
  tag: '$(Build.BuildId)'
  
stages:
- stage: Build
  variables:
  - group: OpenCredentialPublisher.Api-Build
  displayName: Build
  jobs:
  - job: Build
    displayName: Build
    steps:
    - task: Docker@2
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)'
        command: 'build'
        Dockerfile: '$(dockerfilePath)'
        tags: '$(tag)'
        arguments: '--build-arg Nuget_OCPPassword=$(githubPAT)'
